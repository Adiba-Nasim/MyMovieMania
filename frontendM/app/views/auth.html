<!-- frontend/app/views/auth.html -->

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">MyMovieMania</div>
        <p class="auth-tagline">Track films. Write reviews. Build your collection.</p>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab" ng-class="{active: mode==='login'}"    ng-click="switchMode('login')">Sign In</button>
            <button class="auth-tab" ng-class="{active: mode==='register'}" ng-click="switchMode('register')">Create Account</button>
        </div>

        <!-- Global error -->
        <div class="auth-error" ng-show="error && !fieldError">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>

        <!-- REGISTER form -->
        <div ng-show="mode==='register'">

            <div class="form-group" ng-class="{'field-error': fieldError === 'username' || fieldError === 'all'}">
                <label>Username</label>
                <input type="text"
                       ng-model="form.username"
                       ng-change="clearFieldError('username')"
                       placeholder="e.g. cinephile_07"
                       maxlength="30"
                       autocomplete="username">
                <span class="field-hint">3–30 chars. Letters, numbers, _ and . only.</span>
                <span class="field-error-msg" ng-show="fieldError === 'username'">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </span>
            </div>

            <div class="form-group" ng-class="{'field-error': fieldError === 'email' || fieldError === 'all'}">
                <label>Email</label>
                <input type="email"
                       ng-model="form.email"
                       ng-change="clearFieldError('email')"
                       placeholder="you@example.com"
                       autocomplete="email">
                <span class="field-error-msg" ng-show="fieldError === 'email'">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </span>
            </div>

            <div class="form-group" ng-class="{'field-error': fieldError === 'password' || fieldError === 'all'}">
                <label>Password</label>
                <div style="position:relative">
                    <input ng-attr-type="showPassword ? 'text' : 'password'"
                           ng-model="form.password"
                           ng-change="clearFieldError('password')"
                           placeholder="At least 6 characters"
                           autocomplete="new-password">
                    <button type="button"
                            style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:14px"
                            ng-click="showPassword = !showPassword">
                        <i ng-class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                    </button>
                </div>
                <span class="field-hint">Minimum 6 characters.</span>
                <span class="field-error-msg" ng-show="fieldError === 'password'">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </span>
            </div>

            <button class="btn btn-primary auth-submit"
                    ng-click="submit()"
                    ng-disabled="loading">
                <i class="fas fa-spinner fa-spin" ng-show="loading"></i>
                <span ng-hide="loading">Create Account</span>
                <span ng-show="loading">Creating account…</span>
            </button>

            <p class="auth-switch">Already have one? <a ng-click="switchMode('login')">Sign in</a></p>
        </div>

        <!-- LOGIN form -->
        <div ng-show="mode==='login'">

            <div class="form-group" ng-class="{'field-error': fieldError === 'email' || fieldError === 'all'}">
                <label>Email</label>
                <input type="email"
                       ng-model="form.email"
                       ng-change="clearFieldError('email')"
                       placeholder="you@example.com"
                       autocomplete="email">
                <span class="field-error-msg" ng-show="fieldError === 'email'">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </span>
            </div>

            <div class="form-group" ng-class="{'field-error': fieldError === 'password' || fieldError === 'all'}">
                <label>Password</label>
                <div style="position:relative">
                    <input ng-attr-type="showPassword ? 'text' : 'password'"
                           ng-model="form.password"
                           ng-change="clearFieldError('password')"
                           placeholder="Your password"
                           autocomplete="current-password">
                    <button type="button"
                            style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:14px"
                            ng-click="showPassword = !showPassword">
                        <i ng-class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                    </button>
                </div>
                <span class="field-error-msg" ng-show="fieldError === 'password'">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </span>
            </div>

            <button class="btn btn-primary auth-submit"
                    ng-click="submit()"
                    ng-disabled="loading">
                <i class="fas fa-spinner fa-spin" ng-show="loading"></i>
                <span ng-hide="loading">Sign In</span>
                <span ng-show="loading">Signing in…</span>
            </button>

            <p class="auth-switch">Don't have an account? <a ng-click="switchMode('register')">Create one</a></p>
        </div>

    </div>
</div>
